# Pensieve Agent Manifest (test fixture)
name = "pensieve"

description = """
A memory system for web articles. Save URLs to memory, search across your
saved content with semantic search, and ask questions to get synthesized
answers from your knowledge base.
"""

source = "https://github.com/vlindercli/pensieve"
runtime = "container"
executable = "localhost/pensieve:latest"

[requirements]

[requirements.models]
phi3 = "ollama://localhost:11434/phi3:latest"
nomic-embed-text = "ollama://localhost:11434/nomic-embed-text:latest"

[requirements.services.infer]
provider = "openrouter"
protocol = "anthropic"
models = ["anthropic/claude-3.5-sonnet"]

[requirements.services.embed]
provider = "ollama"
protocol = "openai"
models = ["nomic-embed-text"]

[[mounts]]
host_path = "mnt"
guest_path = "/"
mode = "rw"
