[package]
name = "vlindercli"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
extism = "1"
llama-cpp-2 = { version = "0.1", features = ["metal"] }
serde_json = "1"

# Storage stack
rusqlite = { version = "0.32", features = ["bundled"] }
sqlite-vec = "0.1"
zerocopy = { version = "0.7", features = ["derive"] }
