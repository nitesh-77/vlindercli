[package]
name = "vlindercli"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
clap = { version = "4", features = ["derive"] }
dirs = "6"
extism = "1"
indicatif = "0.17"
llama-cpp-2 = { version = "0.1", features = ["metal"] }
reedline = "0.37"
termimad = "0.30"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Storage stack
rusqlite = { version = "0.32", features = ["bundled"] }
sqlite-vec = "0.1"
zerocopy = { version = "0.7", features = ["derive"] }
uuid = { version = "1.20.0", features = ["v4"] }
base64 = "0.22.1"
ureq = { version = "2", features = ["json"] }

# Hashing for model digest verification
sha2 = "0.10"
hex = "0.4"

# NATS messaging (async engine with sync facade)
async-nats = "0.38"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
futures = "0.3"

# gRPC for registry service
tonic = "0.12"
prost = "0.13"

# Signal handling for graceful shutdown
ctrlc = "3.4"

[dev-dependencies]
tempfile = "3"
tokio-stream = { version = "0.1.18", features = ["net"] }

[build-dependencies]
tonic-build = "0.12"
