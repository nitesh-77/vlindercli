[package]
name = "vlindercli"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
extism = "1"
llama-cpp-2 = { version = "0.1", features = ["metal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Storage stack
rusqlite = { version = "0.32", features = ["bundled"] }
sqlite-vec = "0.1"
zerocopy = { version = "0.7", features = ["derive"] }
