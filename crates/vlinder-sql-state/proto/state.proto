syntax = "proto3";

package vlinder.state;

// =============================================================================
// State Service — gRPC interface to the DagStore trait (ADR 079)
// =============================================================================

service StateService {
  // Health check — returns server's protocol version
  rpc Ping(PingRequest) returns (SemVer);

  // DagStore trait methods
  rpc InsertNode(InsertNodeRequest) returns (InsertNodeResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc GetSessionNodes(GetSessionNodesRequest) returns (GetSessionNodesResponse);
  rpc GetChildren(GetChildrenRequest) returns (GetChildrenResponse);
  rpc LatestState(LatestStateRequest) returns (LatestStateResponse);
  rpc LatestNodeHash(LatestNodeHashRequest) returns (LatestNodeHashResponse);
  rpc SetCheckoutState(SetCheckoutStateRequest) returns (SetCheckoutStateResponse);

  // Timeline methods (ADR 093)
  rpc CreateTimeline(CreateTimelineRequest) returns (CreateTimelineResponse);
  rpc GetTimelineByBranch(GetTimelineByBranchRequest) returns (GetTimelineResponse);
  rpc GetTimeline(GetTimelineByIdRequest) returns (GetTimelineResponse);
  // Session CRUD
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc GetSessionByName(GetSessionByNameRequest) returns (GetSessionResponse);

  // Session queries (ADR 113)
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc GetNodesBySubmission(GetNodesBySubmissionRequest) returns (GetNodesBySubmissionResponse);
  rpc GetNodeByPrefix(GetNodeByPrefixRequest) returns (GetNodeResponse);
  rpc GetTimelinesForSession(GetTimelinesForSessionRequest) returns (GetTimelinesForSessionResponse);

  // Derived timeline head query
  rpc LatestNodeOnTimeline(LatestNodeOnTimelineRequest) returns (LatestNodeOnTimelineResponse);
}

// =============================================================================
// Health Check
// =============================================================================

message PingRequest {}

message SemVer {
  uint32 major = 1;
  uint32 minor = 2;
  uint32 patch = 3;
}

// =============================================================================
// DagNode
// =============================================================================

message DagNode {
  string hash = 1;
  string parent_hash = 2;
  string message_type = 3;         // "invoke", "request", "response", "complete", "delegate"
  string sender = 4;               // "from" in domain (reserved word in proto)
  string receiver = 5;             // "to" in domain
  string session_id = 6;
  string submission_id = 7;
  bytes payload = 8;
  bytes diagnostics = 9;
  bytes stderr = 10;
  string created_at = 11;          // ISO-8601
  optional string state = 12;
  string protocol_version = 13;
  optional string checkpoint = 14;
  optional string operation = 15;
  optional string message_blob = 16;  // JSON-serialized ObservableMessage (source of truth)
}

// =============================================================================
// RPC Messages
// =============================================================================

message InsertNodeRequest { DagNode node = 1; }
message InsertNodeResponse {
  bool success = 1;
  optional string error = 2;
}

message GetNodeRequest { string hash = 1; }
message GetNodeResponse { optional DagNode node = 1; }

message GetSessionNodesRequest { string session_id = 1; }
message GetSessionNodesResponse { repeated DagNode nodes = 1; }

message GetChildrenRequest { string parent_hash = 1; }
message GetChildrenResponse { repeated DagNode nodes = 1; }

message LatestStateRequest { string agent_name = 1; }
message LatestStateResponse { optional string state = 1; }

message LatestNodeHashRequest { string session_id = 1; }
message LatestNodeHashResponse { optional string hash = 1; }

message SetCheckoutStateRequest { string agent_name = 1; string state = 2; }
message SetCheckoutStateResponse {
  bool success = 1;
  optional string error = 2;
}

// =============================================================================
// Timeline (ADR 093)
// =============================================================================

message Timeline {
  int64 id = 1;
  string branch_name = 2;
  string session_id = 3;
  optional int64 parent_timeline_id = 4;
  optional string fork_point = 5;
  string created_at = 6;                 // ISO-8601
  optional string broken_at = 7;         // ISO-8601, None = still active
  optional string head = 8;              // hash of latest DagNode on this timeline
}

message CreateTimelineRequest {
  string branch_name = 1;
  string session_id = 2;
  optional int64 parent_id = 3;
  optional string fork_point = 4;
}
message CreateTimelineResponse { int64 id = 1; }

message GetTimelineByBranchRequest { string branch_name = 1; }
message GetTimelineByIdRequest { int64 id = 1; }
message GetTimelineResponse { optional Timeline timeline = 1; }

// =============================================================================
// Session CRUD
// =============================================================================

message SessionProto {
  string id = 1;
  string name = 2;
  string agent_name = 3;
}

message CreateSessionRequest { SessionProto session = 1; }
message CreateSessionResponse { bool success = 1; optional string error = 2; }

message GetSessionRequest { string session_id = 1; }
message GetSessionByNameRequest { string name = 1; }
message GetSessionResponse { optional SessionProto session = 1; }

// =============================================================================
// Session Queries (ADR 113)
// =============================================================================

message SessionSummary {
  string session_id = 1;
  string agent_name = 2;
  string started_at = 3;
  uint64 message_count = 4;
  bool is_open = 5;
}

message ListSessionsRequest {}
message ListSessionsResponse { repeated SessionSummary sessions = 1; }

message GetNodesBySubmissionRequest { string submission_id = 1; }
message GetNodesBySubmissionResponse { repeated DagNode nodes = 1; }

message GetNodeByPrefixRequest { string prefix = 1; }

message GetTimelinesForSessionRequest { string session_id = 1; }
message GetTimelinesForSessionResponse { repeated Timeline timelines = 1; }

// =============================================================================
// Timeline Head Query
// =============================================================================

message LatestNodeOnTimelineRequest {
  int64 timeline_id = 1;
  optional string message_type = 2;  // e.g. "invoke", "complete"; omit for any type
}
message LatestNodeOnTimelineResponse { optional DagNode node = 1; }
