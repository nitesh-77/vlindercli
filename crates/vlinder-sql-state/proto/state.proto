syntax = "proto3";

package vlinder.state;

// =============================================================================
// State Service — gRPC interface to the DagStore trait (ADR 079)
// =============================================================================

service StateService {
  // Health check — returns server's protocol version
  rpc Ping(PingRequest) returns (SemVer);

  // DagStore trait methods
  rpc InsertNode(InsertNodeRequest) returns (InsertNodeResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc GetSessionNodes(GetSessionNodesRequest) returns (GetSessionNodesResponse);
  rpc GetChildren(GetChildrenRequest) returns (GetChildrenResponse);

  // Branch methods
  rpc CreateBranch(CreateBranchRequest) returns (CreateBranchResponse);
  rpc GetBranchByName(GetBranchByNameRequest) returns (GetBranchResponse);
  rpc GetBranch(GetBranchByIdRequest) returns (GetBranchResponse);

  // Session CRUD
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc GetSessionByName(GetSessionByNameRequest) returns (GetSessionResponse);

  // Session queries
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc GetNodesBySubmission(GetNodesBySubmissionRequest) returns (GetNodesBySubmissionResponse);
  rpc GetNodeByPrefix(GetNodeByPrefixRequest) returns (GetNodeResponse);
  rpc GetBranchesForSession(GetBranchesForSessionRequest) returns (GetBranchesForSessionResponse);

  // Typed node operations (ADR 122)
  rpc InsertInvokeNode(InsertInvokeNodeRequest) returns (InsertInvokeNodeResponse);
  rpc InsertCompleteNode(InsertCompleteNodeRequest) returns (InsertCompleteNodeResponse);
  rpc GetInvokeNode(GetInvokeNodeRequest) returns (GetInvokeNodeResponse);
  rpc GetCompleteNode(GetCompleteNodeRequest) returns (GetCompleteNodeResponse);
  rpc GetRequestNode(GetRequestNodeRequest) returns (GetRequestNodeResponse);

  // Branch head query
  rpc LatestNodeOnBranch(LatestNodeOnBranchRequest) returns (LatestNodeOnBranchResponse);

  // Branch mutation
  rpc RenameBranch(RenameBranchRequest) returns (RenameBranchResponse);
  rpc SealBranch(SealBranchRequest) returns (SealBranchResponse);

  // Session mutation
  rpc UpdateSessionDefaultBranch(UpdateSessionDefaultBranchRequest) returns (UpdateSessionDefaultBranchResponse);
}

// =============================================================================
// Health Check
// =============================================================================

message PingRequest {}

message SemVer {
  uint32 major = 1;
  uint32 minor = 2;
  uint32 patch = 3;
}

// =============================================================================
// DagNode
// =============================================================================

message DagNode {
  string hash = 1;
  string parent_hash = 2;
  string message_type = 3;         // "invoke", "request", "response", "complete", "delegate"
  string sender = 4;               // "from" in domain (reserved word in proto)
  string receiver = 5;             // "to" in domain
  string session_id = 6;
  string submission_id = 7;
  bytes payload = 8;
  bytes diagnostics = 9;
  bytes stderr = 10;
  string created_at = 11;          // ISO-8601
  optional string state = 12;
  string protocol_version = 13;
  optional string checkpoint = 14;
  optional string operation = 15;
  optional string message_blob = 16;  // JSON-serialized ObservableMessage (source of truth)
  int64 branch_id = 17;             // branch ID
}

// =============================================================================
// RPC Messages
// =============================================================================

message InsertNodeRequest { DagNode node = 1; }
message InsertNodeResponse {
  bool success = 1;
  optional string error = 2;
}

message GetNodeRequest { string hash = 1; }
message GetNodeResponse { optional DagNode node = 1; }

message GetSessionNodesRequest { string session_id = 1; }
message GetSessionNodesResponse { repeated DagNode nodes = 1; }

message GetChildrenRequest { string parent_hash = 1; }
message GetChildrenResponse { repeated DagNode nodes = 1; }

// =============================================================================
// Branch
// =============================================================================

message Branch {
  int64 id = 1;
  string name = 2;
  string session_id = 3;
  optional string fork_point = 4;
  optional string head = 5;
  string created_at = 6;                 // ISO-8601
  optional string broken_at = 7;         // ISO-8601, None = still active
}

message CreateBranchRequest {
  string name = 1;
  string session_id = 2;
  optional string fork_point = 3;
}
message CreateBranchResponse { int64 id = 1; }

message GetBranchByNameRequest { string name = 1; }
message GetBranchByIdRequest { int64 id = 1; }
message GetBranchResponse { optional Branch branch = 1; }

// =============================================================================
// Session CRUD
// =============================================================================

message SessionProto {
  string id = 1;
  string name = 2;
  string agent_name = 3;
  int64 default_branch = 4;
  string created_at = 5;  // ISO-8601
}

message CreateSessionRequest { SessionProto session = 1; }
message CreateSessionResponse { bool success = 1; optional string error = 2; }

message GetSessionRequest { string session_id = 1; }
message GetSessionByNameRequest { string name = 1; }
message GetSessionResponse { optional SessionProto session = 1; }

// =============================================================================
// Session Queries
// =============================================================================

message SessionSummary {
  string session_id = 1;
  string agent_name = 2;
  string started_at = 3;
  uint64 message_count = 4;
  bool is_open = 5;
}

message ListSessionsRequest {}
message ListSessionsResponse { repeated SessionSummary sessions = 1; }

message GetNodesBySubmissionRequest { string submission_id = 1; }
message GetNodesBySubmissionResponse { repeated DagNode nodes = 1; }

message GetNodeByPrefixRequest { string prefix = 1; }

message GetBranchesForSessionRequest { string session_id = 1; }
message GetBranchesForSessionResponse { repeated Branch branches = 1; }

// =============================================================================
// Branch Head Query
// =============================================================================

message LatestNodeOnBranchRequest {
  int64 branch_id = 1;
  optional string message_type = 2;  // e.g. "invoke", "complete"; omit for any type
}
message LatestNodeOnBranchResponse { optional DagNode node = 1; }

// =============================================================================
// Branch Mutation
// =============================================================================

message RenameBranchRequest {
  int64 id = 1;
  string new_name = 2;
}
message RenameBranchResponse { bool success = 1; optional string error = 2; }

message SealBranchRequest {
  int64 id = 1;
  string broken_at = 2;  // ISO-8601
}
message SealBranchResponse { bool success = 1; optional string error = 2; }

// =============================================================================
// Session Mutation
// =============================================================================

message UpdateSessionDefaultBranchRequest {
  string session_id = 1;
  int64 branch_id = 2;
}
message UpdateSessionDefaultBranchResponse { bool success = 1; optional string error = 2; }

// =============================================================================
// Typed Node Operations (ADR 122)
// =============================================================================

message InsertInvokeNodeRequest {
  InvokeNodeProto node = 1;
  string parent_hash = 2;
  string created_at = 3;
  string snapshot = 4;
}
message InsertInvokeNodeResponse {
  bool success = 1;
  optional string error = 2;
}

message GetInvokeNodeRequest { string dag_hash = 1; }
message GetInvokeNodeResponse {
  optional InvokeNodeProto node = 1;
}

message InvokeNodeProto {
  // Routing
  string session_id = 1;
  int64 branch = 2;
  string submission_id = 3;
  string harness = 4;
  string runtime = 5;
  string agent = 6;
  // Payload
  string message_id = 7;
  optional string state = 8;
  bytes diagnostics = 9;
  bytes payload = 10;
  string dag_parent = 11;
  string dag_hash = 12;
}

message InsertCompleteNodeRequest {
  string dag_hash = 1;
  string parent_hash = 2;
  string created_at = 3;
  string snapshot = 4;
  string session_id = 5;
  string submission_id = 6;
  int64 branch_id = 7;
  string agent = 8;
  string harness = 9;
  string message_id = 10;
  optional string state = 11;
  bytes diagnostics = 12;
  bytes payload = 13;
}
message InsertCompleteNodeResponse {
  bool success = 1;
  optional string error = 2;
}

message GetCompleteNodeRequest { string dag_hash = 1; }
message GetCompleteNodeResponse {
  optional CompleteNodeProto node = 1;
}

message CompleteNodeProto {
  string message_id = 1;
  optional string state = 2;
  bytes diagnostics = 3;
  bytes payload = 4;
  string dag_hash = 5;
}

message GetRequestNodeRequest { string dag_hash = 1; }
message GetRequestNodeResponse {
  optional RequestNodeProto node = 1;
}

message RequestNodeProto {
  string message_id = 1;
  optional string state = 2;
  bytes diagnostics = 3;
  bytes payload = 4;
  string dag_hash = 5;
  optional string checkpoint = 6;
}
