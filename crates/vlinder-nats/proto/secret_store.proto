syntax = "proto3";
package vlinder.secret_store;

service SecretStoreService {
  rpc Ping(PingRequest) returns (SemVer);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Exists(ExistsRequest) returns (ExistsResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message PingRequest {}
message SemVer { uint32 major = 1; uint32 minor = 2; uint32 patch = 3; }

message PutRequest { string name = 1; bytes value = 2; }
message PutResponse { bool success = 1; optional string error = 2; }

message GetRequest { string name = 1; }
message GetResponse { bytes value = 1; bool found = 2; optional string error = 3; }

message ExistsRequest { string name = 1; }
message ExistsResponse { bool exists = 1; optional string error = 2; }

message DeleteRequest { string name = 1; }
message DeleteResponse { bool success = 1; optional string error = 2; }
