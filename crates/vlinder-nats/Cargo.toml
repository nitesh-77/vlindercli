[package]
name = "vlinder-nats"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
vlinder-core = { path = "../vlinder-core" }
serde_json = "1"
async-nats = "0.38"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
futures = "0.3"
tracing = "0.1"
dirs = "6"
tonic = "0.12"
prost = "0.13"

[build-dependencies]
tonic-build = "0.12"
