syntax = "proto3";

package vlinder.harness;

// =============================================================================
// Harness Service — agent session and invocation (ADR 101)
// =============================================================================

service Harness {
  // Health check — returns server's protocol version
  rpc Ping(PingRequest) returns (SemVer);

  // Start a conversation session for an agent (ADR 054).
  // Establishes all per-run context: timeline, state, DAG parent.
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);

  // Run an agent to completion — send input, block for response.
  rpc RunAgent(RunAgentRequest) returns (RunAgentResponse);

  // Replay a failed service call (ADR 113).
  rpc RepairAgent(RepairAgentRequest) returns (RepairAgentResponse);

  // Create a timeline fork by sending ForkMessage through the queue.
  rpc ForkTimeline(ForkTimelineRequest) returns (ForkTimelineResponse);
}

// =============================================================================
// Health Check
// =============================================================================

message PingRequest {}

message SemVer {
  uint32 major = 1;
  uint32 minor = 2;
  uint32 patch = 3;
}

// =============================================================================
// Messages
// =============================================================================

message StartSessionRequest {
  string agent_name = 1;
  string timeline_id = 2;
}

message StartSessionResponse {}

message RunAgentRequest {
  string agent_id = 1;  // ResourceId URI
  string input = 2;
  string timeline_id = 3;
  bool sealed = 4;
  optional string initial_state = 5;
  string dag_parent = 6;
}

message RunAgentResponse {
  string output = 1;
  optional string error = 2;
}

message RepairAgentRequest {
  string agent_id = 1;        // AgentId (routing name)
  string dag_parent = 2;      // canonical hash of fork point
  string checkpoint = 3;      // checkpoint handler name
  string service = 4;         // ServiceType as string
  string backend = 5;         // backend identifier
  string operation = 6;       // Operation as string
  uint32 sequence = 7;        // sequence number
  bytes payload = 8;          // original request payload
  optional string state = 9;  // state hash at original request
  string timeline_id = 10;    // timeline for this repair
}

message RepairAgentResponse {
  string output = 1;
  optional string error = 2;
}

message ForkTimelineRequest {
  string agent_name = 1;
  string branch_name = 2;
  string fork_point = 3;
  int64 parent_timeline_id = 4;
  string timeline_id = 5;
}

message ForkTimelineResponse {
  optional string error = 1;
}
