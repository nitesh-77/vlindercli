syntax = "proto3";

package vlinder.registry;

// =============================================================================
// Registry Service
// =============================================================================

service Registry {
  // Health check — returns server's protocol version
  rpc Ping(PingRequest) returns (SemVer);

  // Agent operations
  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse);
  rpc GetAgentByName(GetAgentByNameRequest) returns (GetAgentResponse);
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);

  // Model operations
  rpc GetModel(GetModelRequest) returns (GetModelResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc RegisterModel(RegisterModelRequest) returns (RegisterModelResponse);
  rpc DeleteModel(DeleteModelRequest) returns (DeleteModelResponse);

  // Job operations
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  rpc UpdateJobStatus(UpdateJobStatusRequest) returns (UpdateJobStatusResponse);
  rpc ListPendingJobs(ListPendingJobsRequest) returns (ListPendingJobsResponse);
}

// =============================================================================
// Health Check
// =============================================================================

message PingRequest {}

message SemVer {
  uint32 major = 1;
  uint32 minor = 2;
  uint32 patch = 3;
}

// =============================================================================
// Common Types
// =============================================================================

message ResourceId {
  string uri = 1;
}

message JobId {
  string id = 1;
}

// =============================================================================
// Agent
// =============================================================================

message Agent {
  string name = 1;
  string description = 2;
  ResourceId id = 3;
  repeated ServiceEntry services = 4;
  ObjectStorageConfig object_storage = 6;
  VectorStorageConfig vector_storage = 7;
  string runtime = 8;     // Runtime type (e.g., "container")
  string executable = 9;  // Native artifact ref (e.g., OCI image)
  repeated Mount mounts = 10;  // Host→guest filesystem mounts (ADR 057)
  repeated ModelAlias models = 11;  // Agent's model alias → URI map
}

message ModelAlias {
  string alias = 1;     // Agent-local name (e.g., "embedding_model")
  string uri = 2;       // Registry model_path (e.g., "ollama://localhost:11434/phi3:latest")
}

message ServiceEntry {
  ServiceType service_type = 1;
  Provider provider = 2;
  Protocol protocol = 3;
  repeated string models = 4;
}

enum ServiceType {
  SERVICE_TYPE_UNSPECIFIED = 0;
  SERVICE_TYPE_INFER = 1;
  SERVICE_TYPE_EMBED = 2;
  SERVICE_TYPE_KV = 3;
  SERVICE_TYPE_VEC = 4;
}

enum Provider {
  PROVIDER_UNSPECIFIED = 0;
  PROVIDER_OPENROUTER = 1;
  PROVIDER_OLLAMA = 2;
}

enum Protocol {
  PROTOCOL_UNSPECIFIED = 0;
  PROTOCOL_OPENAI = 1;
  PROTOCOL_ANTHROPIC = 2;
}

message Mount {
  string host_path = 1;   // Absolute path on host
  string guest_path = 2;  // Path inside container
  bool readonly = 3;
}

message ObjectStorageConfig {
  ResourceId resource_id = 1;
}

message VectorStorageConfig {
  ResourceId resource_id = 1;
  uint32 dimensions = 2;
}

message GetAgentRequest {
  ResourceId id = 1;
}

message GetAgentByNameRequest {
  string name = 1;
}

message GetAgentResponse {
  optional Agent agent = 1;
}

message RegisterAgentRequest {
  Agent agent = 1;
}

message RegisterAgentResponse {
  bool success = 1;
  optional string error = 2;
}

message ListAgentsRequest {}

message ListAgentsResponse {
  repeated Agent agents = 1;
}

// =============================================================================
// Model
// =============================================================================

message Model {
  ResourceId id = 1;
  string name = 2;
  ModelType model_type = 3;
  Provider provider = 4;
  ResourceId model_path = 5;
  string digest = 6;
}

enum ModelType {
  MODEL_TYPE_UNSPECIFIED = 0;
  MODEL_TYPE_INFERENCE = 1;
  MODEL_TYPE_EMBEDDING = 2;
}

message GetModelRequest {
  string name = 1;
}

message GetModelResponse {
  optional Model model = 1;
}

message ListModelsRequest {}

message ListModelsResponse {
  repeated Model models = 1;
}

message RegisterModelRequest {
  Model model = 1;
}

message RegisterModelResponse {
  bool success = 1;
  optional string error = 2;
}

message DeleteModelRequest {
  string name = 1;
}

message DeleteModelResponse {
  bool deleted = 1;
  optional string error = 2;
}

// =============================================================================
// Job
// =============================================================================

// SubmissionId tracks user-initiated requests through the system (ADR 044)
message SubmissionId {
  string id = 1;  // Format: "sub-{uuid}"
}

message Job {
  JobId id = 1;
  SubmissionId submission_id = 2;  // ADR 044: links job to message flow
  ResourceId agent_id = 3;
  string input = 4;
  JobStatus status = 5;
  optional string output = 6;
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PENDING = 1;
  JOB_STATUS_RUNNING = 2;
  JOB_STATUS_COMPLETED = 3;
  JOB_STATUS_FAILED = 4;
}

message CreateJobRequest {
  SubmissionId submission_id = 1;  // ADR 044: caller provides submission context
  ResourceId agent_id = 2;
  string input = 3;
}

message CreateJobResponse {
  JobId job_id = 1;
  SubmissionId submission_id = 2;  // Echo back for confirmation
}

message GetJobRequest {
  JobId id = 1;
}

message GetJobResponse {
  optional Job job = 1;
}

message UpdateJobStatusRequest {
  JobId id = 1;
  JobStatus status = 2;
  optional string output = 3;
}

message UpdateJobStatusResponse {
  bool success = 1;
}

message ListPendingJobsRequest {}

message ListPendingJobsResponse {
  repeated Job jobs = 1;
}
