# cargo-deny configuration
# Run: cargo deny check licenses
# Run: cargo deny check advisories
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
unmaintained = "workspace"

# rustls-webpki 0.101 CRL validation advisory.
# Transitive dep from AWS SDK's rustls 0.21 (aws-smithy-http-client).
# Blocked until AWS updates their HTTP client stack.
# Tracking: github.com/awslabs/aws-sdk-rust/discussions/1257
[[advisories.ignore]]
id = "RUSTSEC-2026-0049"
reason = "Transitive dep from AWS SDK's rustls 0.21 — can't upgrade until aws-smithy-http-client drops rustls 0.21"

[licenses]
# Allow only permissive licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
]

confidence-threshold = 0.8

# Ignore our own unpublished crate
[licenses.private]
ignore = true

# Clarify ring's license (commonly needed)
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]
