name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Run tests
        run: cargo test --workspace

  licenses:
    name: License check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check licenses
        run: cargo deny check licenses

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies for known vulnerabilities
        # RUSTSEC-2026-0049: rustls-webpki 0.101 CRL validation bug.
        # Transitive dep from AWS SDK's rustls 0.21 (aws-smithy-http-client).
        # Blocked until AWS updates: github.com/awslabs/aws-sdk-rust/discussions/1257
        run: cargo audit --ignore RUSTSEC-2026-0049
      - name: Check advisories via cargo-deny
        run: cargo install cargo-deny --locked && cargo deny check advisories

  kani:
    name: Kani proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install Kani
        run: cargo install --locked kani-verifier && cargo kani setup
      - name: Run proofs
        run: cargo kani -p vlinder-core

  build-arm:
    name: Build ARM Linux (AL2023)
    needs: [lint, test]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build in AL2023 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -v cargo-registry:/root/.cargo/registry \
            -v cargo-git:/root/.cargo/git \
            -w /src \
            public.ecr.aws/amazonlinux/amazonlinux:2023 \
            bash -c '
              dnf install -y gcc gcc-c++ make perl-core openssl-devel unzip &&
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
              source "$HOME/.cargo/env" &&
              curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-aarch_64.zip &&
              unzip protoc-28.3-linux-aarch_64.zip -d /usr/local &&
              cargo build --release -p vlinder -p vlinderd --features vlinderd/vendored-openssl -p vlinder-lambda-adapter
            '
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arm-binaries
          path: |
            target/release/vlinder
            target/release/vlinderd
            target/release/vlinder-lambda-adapter

  upload-s3:
    name: Upload to S3
    needs: [build-arm]
    if: vars.UPLOAD_S3 == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: arm-binaries
          path: binaries
      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CI_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: |
          aws s3 cp binaries/vlinder "s3://${{ secrets.ARTIFACTS_BUCKET }}/${{ github.sha }}/vlinder"
          aws s3 cp binaries/vlinder "s3://${{ secrets.ARTIFACTS_BUCKET }}/latest/vlinder"
          aws s3 cp binaries/vlinderd "s3://${{ secrets.ARTIFACTS_BUCKET }}/${{ github.sha }}/vlinderd"
          aws s3 cp binaries/vlinderd "s3://${{ secrets.ARTIFACTS_BUCKET }}/latest/vlinderd"
          aws s3 cp binaries/vlinder-lambda-adapter "s3://${{ secrets.ARTIFACTS_BUCKET }}/${{ github.sha }}/vlinder-lambda-adapter"
          aws s3 cp binaries/vlinder-lambda-adapter "s3://${{ secrets.ARTIFACTS_BUCKET }}/latest/vlinder-lambda-adapter"
