name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Run tests
        run: cargo test

  licenses:
    name: License check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check licenses
        run: cargo deny check licenses

  build-arm:
    name: Build ARM Linux
    needs: [lint, test]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: arm64
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Build
        run: cargo build --release -p vlinder -p vlinderd --features vlinderd/vendored-openssl -p vlinder-lambda-adapter
      - name: Upload binaries to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CI_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: |
          aws s3 cp target/release/vlinder "s3://${{ secrets.ARTIFACTS_BUCKET }}/${{ github.sha }}/vlinder"
          aws s3 cp target/release/vlinder "s3://${{ secrets.ARTIFACTS_BUCKET }}/latest/vlinder"
          aws s3 cp target/release/vlinderd "s3://${{ secrets.ARTIFACTS_BUCKET }}/${{ github.sha }}/vlinderd"
          aws s3 cp target/release/vlinderd "s3://${{ secrets.ARTIFACTS_BUCKET }}/latest/vlinderd"
          aws s3 cp target/release/vlinder-lambda-adapter "s3://${{ secrets.ARTIFACTS_BUCKET }}/${{ github.sha }}/vlinder-lambda-adapter"
          aws s3 cp target/release/vlinder-lambda-adapter "s3://${{ secrets.ARTIFACTS_BUCKET }}/latest/vlinder-lambda-adapter"
      - name: Build and push Lambda agent images to ECR
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CI_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: |
          aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REPO_URL }}
          cp target/release/vlinder-lambda-adapter agents/echo-lambda/
          docker build -t "${{ secrets.ECR_REPO_URL }}:echo-lambda-${{ github.sha }}" -t "${{ secrets.ECR_REPO_URL }}:echo-lambda-latest" agents/echo-lambda/
          docker push "${{ secrets.ECR_REPO_URL }}:echo-lambda-${{ github.sha }}"
          docker push "${{ secrets.ECR_REPO_URL }}:echo-lambda-latest"
          cp target/release/vlinder-lambda-adapter agents/todoapp/
          docker build -t "${{ secrets.ECR_REPO_URL }}:todoapp-${{ github.sha }}" -t "${{ secrets.ECR_REPO_URL }}:todoapp-latest" agents/todoapp/
          docker push "${{ secrets.ECR_REPO_URL }}:todoapp-${{ github.sha }}"
          docker push "${{ secrets.ECR_REPO_URL }}:todoapp-latest"
