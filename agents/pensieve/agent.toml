# =============================================================================
# VLINDERFILE - Pensieve Agent Manifest
# =============================================================================
#
# This file declares the agent's identity and requirements to the Vlinder runtime.
# It also serves as documentation for the prompts hardcoded in the agent.
#
# STRUCTURE:
#   1. Identity     - Who is this agent?
#   2. Requirements - What does it need to run?
#   3. Prompts      - LLM prompts (commented = using hardcoded defaults)
#
# CUSTOMIZATION:
#   - Prompts are commented out by default (agent uses hardcoded values)
#   - Uncomment and modify to experiment with different models or phrasings
#   - If you break something, delete this file - runtime will regenerate defaults
#
# =============================================================================


# -----------------------------------------------------------------------------
# 1. IDENTITY
# -----------------------------------------------------------------------------
# These fields help humans and orchestrators understand what this agent does.

name = "pensieve"

description = """
A memory system for web articles. Save URLs to memory, search across your
saved content with semantic search, and ask questions to get synthesized
answers from your knowledge base. Like Dumbledore's pensieve, but for the web.
"""

source = "https://github.com/vlindercli/pensieve"
code = "agent.wasm"


# -----------------------------------------------------------------------------
# 2. REQUIREMENTS
# -----------------------------------------------------------------------------
# The runtime reads this section to know what capabilities to provide.
# If the runtime can't satisfy these requirements, the agent won't load.

[requirements]

# Models this agent needs access to via the `infer` and `embed` host functions.
# The runtime maps these names to actual model backends (ollama, llama.cpp, etc.)
#
# - phi3: Small, fast inference model for intent classification and summarization
# - nomic-embed: Embedding model for semantic search
#
# Want to try a different model? Change the name here and update prompts below.
models = ["phi3", "nomic-embed"]

# Services this agent requires from the runtime.
# These form the agent's interface to the outside world.
#
# Inference & Embeddings:
#   - infer: Call an LLM with a prompt, get text back
#   - embed: Convert text to vector embeddings
#
# Persistence (scoped to this agent's namespace):
#   - get_file: Read a cached file
#   - put_file: Write a file to cache
#   - list_files: List files in a directory
#
# Vector Storage:
#   - store_embedding: Save a vector with metadata
#   - search_by_vector: Find similar vectors
#
services = [
    "infer",
    "embed",
    "get_file",
    "put_file",
    "list_files",
    "store_embedding",
    "search_by_vector",
]


# -----------------------------------------------------------------------------
# 2.5. FILESYSTEM MOUNTS
# -----------------------------------------------------------------------------
# WASI filesystem mounts allow the agent to access real host directories.
# Coexists with SQLite storage - use mounts for real files, storage for data.
#
# host_path: Relative paths resolved against .vlinder/agents/<name>/, absolute paths as-is
# guest_path: Must be absolute (start with /)
# mode: "ro" (read-only) or "rw" (read-write), defaults to "rw"
#
# Default: If no [[mounts]] declared, auto-adds mnt -> / (rw)

[[mounts]]
host_path = "mnt"
guest_path = "/"
mode = "rw"


# -----------------------------------------------------------------------------
# 3. PROMPTS (Optional Overrides)
# -----------------------------------------------------------------------------
# The agent has sensible defaults hardcoded in the WASM. This section documents
# those defaults and lets you override them for experimentation.
#
# WHY OVERRIDE?
#   - Testing a new model that needs different prompt formatting
#   - Tweaking behavior without recompiling the agent
#   - A/B testing prompt variations
#
# HOW TO OVERRIDE:
#   1. Uncomment the [prompts] section and the specific prompt
#   2. Modify the text (use ''' for multi-line literals)
#   3. Restart the agent
#
# PLACEHOLDERS:
#   Prompts use {placeholder} syntax. The agent substitutes these at runtime:
#   - {input}    : User's raw input text
#   - {query}    : Search query or question
#   - {context}  : Retrieved passages for RAG
#   - {question} : User's question (for answer generation)
#   - {chunk}    : A single text chunk (for summarization)
#   - {points}   : Bullet points from map phase (for reduce phase)
#   - {text}     : Full text content (for direct summarization)
#
# -----------------------------------------------------------------------------

# [prompts]

# INTENT RECOGNITION
# Classifies user input into one of: PROCESS_URL, LIST_MEMORIES, GET_MEMORY,
# SEARCH, QUESTION, or UNKNOWN. Returns JSON with intent and confidence.
#
# intent_recognition = '''
# You are an intent classifier for a memory system called Pensieve.
#
# Analyze the user's request and respond with ONLY a JSON object (no markdown, no explanation).
#
# The six possible intents are:
# 1. "PROCESS_URL" - User wants to save/commit a web page to memory. Must contain a URL.
# 2. "LIST_MEMORIES" - User wants to see all stored memories/articles.
# 3. "GET_MEMORY" - User wants to retrieve a specific stored memory by URL.
# 4. "SEARCH" - User wants to browse/explore source passages about a topic.
# 5. "QUESTION" - User wants a direct answer synthesized from their memories.
# 6. "UNKNOWN" - The request doesn't clearly match any of the above intents.
#
# Response format:
# {{"intent": "INTENT_NAME", "url": "extracted_url_if_any", "query": "search_or_question_query", "confidence": 0.0_to_1.0}}
#
# User request: {input}
#
# JSON response:
# '''

# QUERY EXPANSION
# Expands short queries into richer descriptions for better semantic search.
# Example: "work" → "meaningful work, career development, professional growth..."
#
# query_expansion = '''
# You are a query expansion assistant. Your job is to transform short, ambiguous
# search queries into richer, more descriptive questions that will help find
# relevant content.
#
# Rules:
# - Expand the query into a descriptive question or phrase (1-2 sentences max)
# - Include related concepts, synonyms, and aspects of the topic
# - Keep it focused - don't add unrelated tangents
# - Output ONLY the expanded query, nothing else
#
# User: {query}
# Expanded:
# '''

# ANSWER GENERATION (RAG)
# Synthesizes an answer from retrieved context. Used by the QUESTION intent.
#
# answer_generation = '''
# You are a helpful assistant answering questions based on the user's stored
# memories (articles they've saved).
#
# CONTEXT (from user's saved articles):
# {context}
#
# QUESTION: {question}
#
# Instructions:
# - Answer the question using ONLY the information from the context above
# - If the context doesn't contain enough information, say so honestly
# - Be concise but thorough (2-4 paragraphs for complex topics, 1-2 for simple ones)
# - Don't mention "the context" or "the passages" - speak naturally
# - If there are multiple perspectives or ideas, synthesize them coherently
#
# ANSWER:
# '''

