name = "mount-test-agent"
description = "Test agent with explicit mounts"
runtime = "container"
executable = "localhost/mount-test-agent:latest"

[requirements]
services = []

[[mounts]]
host_path = "data"
guest_path = "/data"
mode = "ro"

[[mounts]]
host_path = "output"
guest_path = "/output"
mode = "rw"
