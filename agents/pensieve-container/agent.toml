name = "pensieve-container"
description = """
A memory system for web articles (container edition). Save URLs to memory,
search across your saved content with semantic search, and ask questions to
get synthesized answers from your knowledge base.
"""
runtime = "container"
executable = "localhost/pensieve-container:latest"

# Storage backends
object_storage = "sqlite://data/objects.db"
vector_storage = "sqlite://data/vectors.db"

[requirements]

[requirements.models]
phi3 = "phi3:latest"
nomic-embed = "nomic-embed"
