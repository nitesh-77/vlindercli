name = "todoapp"
description = """
A natural language todo list agent powered by OpenRouter.
Send commands like "add buy groceries", "list", "done 2", or ask
"what should I focus on?" for AI-powered prioritization.
Use "search cooking" to find related todos by meaning.
"""
runtime = "container"
executable = "localhost/todoapp:latest"

# Persist todos across invocations
object_storage = "sqlite://data/objects.db"
vector_storage = "sqlite://data/vectors.db"

[requirements]

[requirements.models]
inference_model = "openrouter://anthropic/claude-sonnet-4"
embedding_model = "ollama://localhost:11434/nomic-embed-text:latest"

[requirements.services.infer]
provider = "openrouter"
protocol = "openai"

[requirements.services.embed]
provider = "ollama"
protocol = "openai"
