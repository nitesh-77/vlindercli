# Machine 1: Registry + WASM Agent Runtimes
#
# This machine runs:
# - Registry gRPC service (coordinates all workers)
# - WASM agent runtimes (executes agent code)
#
# Copy to ~/.vlinder/config.toml or set VLINDER_DIR

[logging]
level = "info"
llama_level = "error"

[queue]
backend = "nats"
nats_url = "nats://nats.local:4222"

[ollama]
# Not used on this machine - inference runs elsewhere
endpoint = "http://machine2.local:11434"

[distributed]
enabled = true
# This machine hosts the registry
registry_addr = "0.0.0.0:9090"

[distributed.workers]
# Run the registry on this machine
registry = 1

[distributed.workers.agent]
# Run 2 WASM agent workers
wasm = 2

[distributed.workers.inference]
# No inference workers here - they run on machine2
ollama = 0

[distributed.workers.embedding]
# No embedding workers here - they run on machine2
ollama = 0

[distributed.workers.storage.object]
# No storage workers here - they run on machine3
sqlite = 0
memory = 0

[distributed.workers.storage.vector]
# No storage workers here - they run on machine3
sqlite = 0
memory = 0
