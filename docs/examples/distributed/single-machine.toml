# Single Machine Distributed Mode
#
# Run all services in distributed mode on one machine.
# Useful for testing the multi-process architecture locally.
#
# Prerequisites:
# - NATS with JetStream: nats-server -js
# - Ollama: ollama serve
#
# Copy to ~/.vlinder/config.toml or set VLINDER_DIR

[logging]
level = "info"
llama_level = "error"

[queue]
backend = "nats"
nats_url = "nats://localhost:4222"

[state]
backend = "grpc"

[ollama]
endpoint = "http://localhost:11434"

[distributed]
enabled = true
registry_addr = "http://0.0.0.0:9090"
state_addr = "http://0.0.0.0:9092"
harness_addr = "http://0.0.0.0:9091"
secret_addr = "http://0.0.0.0:9093"
catalog_addr = "http://0.0.0.0:9094"

[distributed.workers]
registry = 1
harness = 1

[distributed.workers.agent]
container = 1

[distributed.workers.inference]
ollama = 1

[distributed.workers.embedding]
ollama = 1

[distributed.workers.storage.object]
sqlite = 1

[distributed.workers.storage.vector]
sqlite = 1
